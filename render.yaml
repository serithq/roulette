# Render Blueprint: https://render.com/docs/blueprint-spec
# GitHub に push したあと、ダッシュボードから Import Blueprint で使えます
services:
  - type: web
    name: extension-cord-roulette
    env: ruby
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec rackup -o 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: RACK_ENV
        value: production
